name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev \
            libgtk-3-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev \
            libpipewire-0.3-dev

      - run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        id: tauri
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "MarkerOn ${{ github.ref_name }}"
          releaseBody: ""
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Build MSIX
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: bash scripts/build-msix.sh

      - name: Upload MSIX to release
        if: matrix.platform == 'windows-latest'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MSIX=$(ls src-tauri/target/release/bundle/msix/*.msix)
          gh release upload "${{ github.ref_name }}" "$MSIX" --clobber

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog and publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          PREV_TAG=$(git tag --sort=-v:refname | grep -A1 "^${TAG}$" | tail -1)

          if [ "$PREV_TAG" = "$TAG" ] || [ -z "$PREV_TAG" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          fi

          echo "Generating changelog from $PREV_TAG to $TAG"

          FEATURES=""
          FIXES=""
          OTHERS=""

          while IFS= read -r line; do
            MSG=$(echo "$line" | sed 's/^[^ ]* //')
            if echo "$MSG" | grep -qE '^feat(\(.+\))?:'; then
              FEATURES="${FEATURES}- ${MSG#*: }"$'\n'
            elif echo "$MSG" | grep -qE '^fix(\(.+\))?:'; then
              FIXES="${FIXES}- ${MSG#*: }"$'\n'
            elif echo "$MSG" | grep -qE '^(chore|docs|style|refactor|perf|test|ci)(\(.+\))?:'; then
              OTHERS="${OTHERS}- ${MSG#*: }"$'\n'
            fi
          done < <(git log --oneline "${PREV_TAG}..${TAG}" --no-merges)

          BODY=""
          if [ -n "$FEATURES" ]; then
            BODY="${BODY}## ✨ New Features"$'\n'"${FEATURES}"$'\n'
          fi
          if [ -n "$FIXES" ]; then
            BODY="${BODY}## 🐛 Bug Fixes"$'\n'"${FIXES}"$'\n'
          fi
          if [ -n "$OTHERS" ]; then
            BODY="${BODY}## 🔧 Other Changes"$'\n'"${OTHERS}"$'\n'
          fi

          BODY="${BODY}## 📦 Downloads"$'\n'
          BODY="${BODY}| Platform | File |"$'\n'
          BODY="${BODY}|----------|------|"$'\n'
          BODY="${BODY}| Windows | \`.exe\` (NSIS installer) / \`.msi\` / \`.msix\` |"$'\n'
          BODY="${BODY}| macOS (Apple Silicon) | \`.dmg\` |"$'\n'
          BODY="${BODY}| Linux | \`.deb\` / \`.AppImage\` |"$'\n'

          gh release edit "$TAG" --notes "$BODY" --draft=false
